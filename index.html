<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 게임 천국 🕹️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            color: #ffcc00;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .game-card {
            background-color: #2a2a35;
            border: 3px solid #ffcc00;
            border-radius: 15px;
            padding: 30px;
            width: 250px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .game-card:hover {
            transform: scale(1.05);
            background-color: #3b3b4a;
        }
        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>미니 게임 천국 🎮</h1>
    <p>플레이하고 싶은 게임을 선택하세요!</p>

    <div class="container">
        <!-- 첫 번째 게임 연결 (href에 파일 이름을 적어줍니다) -->
        <a href="mygame1_v4.7.html" class="game-card">
            <div class="game-icon">🎫</div>
            <div>추억의 뽑기</div>
        </a>

        <!-- 두 번째 게임 연결 -->
        <a href="mygame2_v2.3.html" class="game-card">
            <div class="game-icon">🧩</div>
            <div>사진 맞히기</div>
        </a>
    </div>

</body>
</html>
