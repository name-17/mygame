<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니 게임 천국 🕹️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 55px 20px;
            margin: 0;
        }
        h1 {
            color: #ffcc00;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .container {
            display: grid;
            /* 가로 2줄 고정 설정 */
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px;
            max-width: 600px; /* 2x2 형태가 가장 예쁘게 깨지지 않는 너비 */
            margin: 0 auto;
        }
        .game-card {
            background-color: #2a2a35;
            border: 3px solid var(--card-color, #ffcc00);
            border-radius: 15px;
            padding: 35px 20px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .game-card:hover {
            transform: scale(1.05);
            background-color: #3b3b4a;
        }
        .game-icon {
            font-size: 3.2rem;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.25rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>미니 게임 천국 🎮</h1>
    <p class="subtitle">플레이하고 싶은 게임을 선택하세요!</p>

    <div class="container">
        <!-- 첫 번째 게임 (1행 1열) -->
        <a href="mygame1_v4.7.html" class="game-card" style="--card-color: #ff5e62;">
            <div class="game-icon">🎫</div>
            <div class="game-title">추억의 뽑기</div>
        </a>

        <!-- 두 번째 게임 (1행 2열) -->
        <a href="mygame2_v2.3.html" class="game-card" style="--card-color: #ff9966;">
            <div class="game-icon">🧩</div>
            <div class="game-title">사진 맞히기</div>
        </a>

        <!-- 세 번째 게임 (2행 1열) -->
        <a href="mygame3_v1.0.html" class="game-card" style="--card-color: #00b4db;">
            <div class="game-icon">🐍</div>
            <div class="game-title">뱀주사위 대결</div>
        </a>

        <!-- 네 번째 게임 (2행 2열) -->
        <a href="mygame4_v1.0.html" class="game-card" style="--card-color: #11998e;">
            <div class="game-icon">🪜</div>
            <div class="game-title">사다리 타기</div>
        </a>
    </div>

</body>
</html>
