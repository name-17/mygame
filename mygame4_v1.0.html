<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리타기 게임</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #1a1a24; color: #fff; }
        .setup-section, .control-section { margin-bottom: 25px; }
        
        /* 사다리 전체 컨테이너 */
        .ladder-container { display: inline-flex; justify-content: center; align-items: flex-start; position: relative; margin-top: 20px; padding: 10px; }
        .ladder-group { display: flex; flex-direction: column; align-items: center; position: relative; width: 120px; }
        
        /* 입력 상자 기본 스타일 */
        .input-box { width: 70px; padding: 5px; text-align: center; border: 1px solid #444; background: #2a2a36; color: #fff; border-radius: 4px; z-index: 5; height: 18px; line-height: 18px; box-sizing: content-box; }
        
        /* 상단 이름 말 칸 기본 및 호버 스타일 */
        .top-user-input { border: 1px solid #00cec9; transition: all 0.2s; position: relative; z-index: 15; }
        .top-user-input:hover { background-color: #2a3a46; box-shadow: 0 0 8px rgba(0, 206, 201, 0.5); }
        .top-user-input.ready-to-trace { cursor: pointer; }
        .top-user-input.ready-to-trace:hover { background-color: #00cec9; color: #000; box-shadow: 0 0 12px #00cec9; }
        
        .vertical-line { width: 4px; height: 300px; background-color: #444; margin: 15px 0; position: relative; }
        .middle-input { position: absolute; left: 60px; top: 50%; transform: translate(-50%, -50%); z-index: 12; background-color: #2a2a36; border: 2px solid #3498db; transition: opacity 0.3s ease; }
        .horizontal-bridge { position: absolute; height: 4px; background-color: #444; top: 0; left: 0; width: 120px; z-index: 1; }
        .hidden-bridge { position: absolute; height: 4px; background-color: #fff200; top: 0; left: 0; width: 120px; z-index: 1; }
        
        /* [교정] 가림막 내부 글자를 12시 방향(상단 중앙)으로 재배치 */
        .blind-box { 
            position: absolute; 
            top: 25%; 
            left: 60px; 
            width: calc(100% - 120px); 
            height: 50%; 
            background-color: #2c3e50; 
            border: 2px dashed #ff7675; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* 12시 방향 정렬 */
            padding-top: 15px;       /* 상단 여백 확보 */
            box-sizing: border-box; 
            font-weight: bold; 
            font-size: 16px; 
            z-index: 10; 
            border-radius: 6px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            transition: opacity 0.3s ease; 
            pointer-events: none; 
        }
        
        /* 사이버펑크 네온스타일 고품격 버튼 디자인 */
        button { 
            padding: 0 20px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 0 8px; background: #1e1e2a; color: #fff; border: 2px solid #555; border-radius: 30px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); height: 42px; box-sizing: border-box; vertical-align: middle; letter-spacing: 0.5px;
        }
        
        .create-btn { border-color: #00cec9; color: #00cec9; }
        .create-btn:hover { background: #00cec9; color: #1a1a24; box-shadow: 0 0 15px #00cec9, 0 0 30px rgba(0, 206, 201, 0.4); transform: translateY(-2px) scale(1.03); }
        .create-btn:active { transform: translateY(1px); }

        .accent-btn { border-color: #ff7675; color: #ff7675; }
        .accent-btn:hover { background: #ff7675; color: #1a1a24; box-shadow: 0 0 15px #ff7675, 0 0 30px rgba(255, 118, 117, 0.4); transform: translateY(-2px) scale(1.03); }
        .accent-btn:active { transform: translateY(1px); }

        /* 결과 칸 당첨 네온 이펙트 */
        .highlight-result { border: 2px solid #ff7675 !important; background-color: #ff7675 !important; color: #fff !important; font-weight: bold; animation: neon-glow 0.6s infinite alternate; }
        @keyframes neon-glow {
            from { box-shadow: 0 0 4px #ff7675, 0 0 10px #ff7675, 0 0 20px #ff4757; opacity: 0.8; }
            to { box-shadow: 0 0 12px #ff7675, 0 0 25px #ff7675, 0 0 40px #ff4757; opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>사다리타기 게임</h1>
    <div class="setup-section">
        <label for="line-count" style="font-weight: bold; font-size: 15px; color: #a0a0ba;">세로줄 개수: </label>
        <input type="number" id="line-count" min="2" max="10" value="4" style="width: 55px; height: 42px; padding: 0 10px; font-weight: bold; font-size: 15px; background: #2a2a36; color: #fff; border: 2px solid #555; border-radius: 8px; box-sizing: border-box; vertical-align: middle; text-align: center;">
        <button class="create-btn" onclick="createLadder()">새로 만들기</button>
    </div>
    <div class="control-section">
        <button class="accent-btn" onclick="generateHiddenBridges()">히든 가로줄 추가</button>
    </div>
    <div id="ladder-board" class="ladder-container"></div>
    <script>
        let isBlindOpen = false; 

        function createLadder() {
            const board = document.getElementById('ladder-board');
            const count = parseInt(document.getElementById('line-count').value);
            isBlindOpen = false; 
            board.innerHTML = '';
            if (count < 2) { alert('세로줄은 최소 2개 이상이어야 합니다.'); return; }
            for (let i = 0; i < count; i++) {
                const group = document.createElement('div');
                group.className = 'ladder-group';
                
                const topInput = document.createElement('input');
                topInput.type = 'text'; topInput.className = 'input-box top-user-input';
                topInput.placeholder = `이름 ${i + 1}`; 
                topInput.onclick = null; 

                const verticalLine = document.createElement('div');
                verticalLine.className = 'vertical-line'; verticalLine.id = `line-${i}`;
                if (i < count - 1) {
                    const middleInput = document.createElement('input');
                    middleInput.type = 'number'; middleInput.className = 'input-box middle-input';
                    middleInput.id = `mid-input-${i}`; middleInput.min = '0'; middleInput.max = '10'; middleInput.value = '2'; 
                    verticalLine.appendChild(middleInput);
                }
                const bottomInput = document.createElement('input');
                bottomInput.type = 'text'; bottomInput.className = 'input-box bottom-result-input';
                bottomInput.id = `result-${i}`; bottomInput.placeholder = `결과 ${i + 1}`;
                group.appendChild(topInput); group.appendChild(verticalLine); group.appendChild(bottomInput); board.appendChild(group);
            }
            generateDefaultBridges(count);
            
            const blind = document.createElement('div');
            blind.id = 'blind-gate'; blind.className = 'blind-box'; blind.innerText = '입력한 숫자만큼 가로줄 랜덤추가'; board.appendChild(blind);
        }

        function generateDefaultBridges(count) {
            for (let i = 0; i < count - 1; i++) {
                const currentLine = document.getElementById(`line-${i}`);
                const topBridge = document.createElement('div');
                topBridge.className = 'horizontal-bridge';
                topBridge.dataset.top = Math.floor(Math.random() * 17) + 3; 
                topBridge.style.top = `${topBridge.dataset.top}%`; 
                currentLine.appendChild(topBridge);
                
                const bottomBridge = document.createElement('div');
                bottomBridge.className = 'horizontal-bridge';
                bottomBridge.dataset.top = Math.floor(Math.random() * 17) + 80; 
                bottomBridge.style.top = `${bottomBridge.dataset.top}%`; 
                currentLine.appendChild(bottomBridge);
            }
        }

        function generateHiddenBridges() {
            const count = parseInt(document.getElementById('line-count').value);
            const oldHiddenBridges = document.querySelectorAll('.hidden-bridge');
            oldHiddenBridges.forEach(bridge => bridge.remove());
            clearGlow(); 
            for (let i = 0; i < count - 1; i++) {
                const currentLine = document.getElementById(`line-${i}`);
                const midIn = document.getElementById(`mid-input-${i}`);
                const inputVal = midIn ? parseInt(midIn.value) : 0;
                const bridgeCount = isNaN(inputVal) ? 0 : inputVal;
                const existingTops = [];
                for (let j = 0; j < bridgeCount; j++) {
                    let randomTop; let isTooClose; let attempts = 0;
                    do {
                        isTooClose = false; 
                        randomTop = Math.floor(Math.random() * 48) + 26; 
                        for (let k = 0; k < existingTops.length; k++) { if (Math.abs(existingTops[k] - randomTop) < 3) { isTooClose = true; break; } }
                        attempts++;
                    } while (isTooClose && attempts < 100);
                    existingTops.push(randomTop);
                    const hiddenBridge = document.createElement('div');
                    hiddenBridge.className = 'hidden-bridge'; hiddenBridge.dataset.top = randomTop; 
                    hiddenBridge.style.top = `${randomTop}%`; currentLine.appendChild(hiddenBridge);
                }
            }
            toggleBlind(false);
        }
        function toggleBlind(show) {
            const blind = document.getElementById('blind-gate');
            if (!blind) return;
            
            const middleInputs = document.querySelectorAll('.middle-input');
            const topInputs = document.querySelectorAll('.top-user-input');

            if (show) {
                blind.style.opacity = '1';
                isBlindOpen = false;
                middleInputs.forEach(input => input.style.display = 'block'); 
                
                topInputs.forEach((input) => {
                    input.onclick = null;
                    input.classList.remove('ready-to-trace');
                });
                clearGlow();
            } else {
                blind.style.opacity = '0';
                isBlindOpen = true;
                middleInputs.forEach(input => input.style.display = 'none'); 
                
                topInputs.forEach((input, index) => {
                    input.classList.add('ready-to-trace');
                    input.onclick = () => findResultAndGlow(index);
                });
            }
        }

        function findResultAndGlow(startIndex) {
            if (!isBlindOpen) return;
            clearGlow(); 

            const count = parseInt(document.getElementById('line-count').value);
            const allBridges = [];
            
            for (let i = 0; i < count - 1; i++) {
                const line = document.getElementById(`line-${i}`);
                const bridges = line.querySelectorAll('.horizontal-bridge, .hidden-bridge');
                bridges.forEach(b => { 
                    allBridges.push({ leftLine: i, rightLine: i + 1, topPercent: parseFloat(b.dataset.top) }); 
                });
            }
            allBridges.sort((a, b) => a.topPercent - b.topPercent);

            let currentLine = startIndex;
            allBridges.forEach(bridge => {
                if (bridge.leftLine === currentLine) { 
                    currentLine = bridge.rightLine; 
                } else if (bridge.rightLine === currentLine) { 
                    currentLine = bridge.leftLine; 
                }
            });

            const targetResultBox = document.getElementById(`result-${currentLine}`);
            if (targetResultBox) {
                targetResultBox.classList.add('highlight-result');
            }
        }

        function clearGlow() {
            const highlighted = document.querySelectorAll('.bottom-result-input');
            highlighted.forEach(box => box.classList.remove('highlight-result'));
        }
        window.onload = createLadder;
    </script>
</body>
</html>
