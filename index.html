<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미니게임</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e24;
            color: #fff;
            text-align: center;
            padding: 55px 20px;
            margin: 0;
        }
        h1 {
            color: #ffcc00;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .container {
            display: grid;
            /* 가로 3열 고정 설정 (데이터가 늘어나면 자동으로 행이 추가됨) */
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px;
            max-width: 900px; /* 3X2 형태를 유지하는 최적의 넓은 너비 */
            margin: 0 auto;
        }
        .game-card {
            background-color: #2a2a35;
            border: 3px solid var(--card-color, #ffcc00);
            border-radius: 15px;
            padding: 35px 20px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .game-card:hover, .game-card:focus {
            transform: scale(1.05);
            background-color: #3b3b4a;
            box-shadow: 0 10px 25px var(--card-color);
            outline: none;
        }
        .game-icon {
            font-size: 3.2rem;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* 테블릿 및 모바일 대응을 위한 반응형 설정 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr); /* 패드 크기에서는 가로 2열 */
            }
        }
        @media (max-width: 480px) {
            .container {
                grid-template-columns: 1fr; /* 스마트폰에서는 가로 1열 */
            }
        }
    </style>
</head>
<body>

    <h1>미니게임 🎮</h1>
    <p class="subtitle">플레이하고 싶은 게임을 선택하세요!</p>

    <div class="container">
        <!-- 1행 1열 -->
        <a href="mygame1_v4.7.html" class="game-card" style="--card-color: #ff5e62;">
            <div class="game-icon" aria-hidden="true">🎫</div>
            <div class="game-title">추억의 뽑기</div>
        </a>

        <!-- 1행 2열 -->
        <a href="mygame2_v2.3.html" class="game-card" style="--card-color: #ff9966;">
            <div class="game-icon" aria-hidden="true">🧩</div>
            <div class="game-title">사진 맞히기</div>
        </a>

        <!-- 1행 3열 -->
        <a href="mygame3_v1.0.html" class="game-card" style="--card-color: #00b4db;">
            <div class="game-icon" aria-hidden="true">🐍</div>
            <div class="game-title">뱀주사위 대결(테스트중)</div>
        </a>

        <!-- 2행 1열 -->
        <a href="mygame4_v1.2.html" class="game-card" style="--card-color: #11998e;">
            <div class="game-icon" aria-hidden="true">🪜</div>
            <div class="game-title">사다리 타기</div>
        </a>

        <!-- 2행 2열 -->
        <a href="mygame5_v1.5.html" class="game-card" style="--card-color: #b31217;">
            <div class="game-icon" aria-hidden="true">🏁</div>
            <div class="game-title">주루마블(테스트중)</div>
        </a>

        <!-- 2행 3열 -->
        <a href="mygame6_v1.2.html" class="game-card" style="--card-color: #8e2de2;">
            <div class="game-icon" aria-hidden="true">🎲</div>
            <div class="game-title">주사위 굴리기</div>
        </a>
    </div>

</body>
</html>
