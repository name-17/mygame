<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사진 조각 맞히기</title>
<style>
body { margin: 0; padding: 20px; background-color: #1a1a1a; color: #ffffff; font-family: 'Malgun Gothic', sans-serif; height: 100vh; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
.setup-screen { background-color: #262626; padding: 40px; border-radius: 12px; border: 2px solid #ffcc00; width: 400px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative; }
.setup-screen h1 { margin: 0 0 30px 0; color: #ffcc00; font-size: 24px; }
.file-label { display: block; background-color: #444; padding: 15px; border-radius: 6px; cursor: pointer; border: 2px dashed #666; margin-bottom: 25px; transition: all 0.2s; }
.file-label:hover { background-color: #555; border-color: #ffcc00; }
#imageInput { display: none; }
.grid-select-zone { margin-bottom: 25px; text-align: left; }
.grid-select-zone label { display: block; font-size: 14px; color: #aaa; margin-bottom: 8px; font-weight: bold; }
.select-box { width: 100%; padding: 12px; background-color: #333; color: white; border: 1px solid #555; border-radius: 6px; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
.status-message { font-size: 16px; color: #28a745; font-weight: bold; margin-bottom: 25px; display: none; }
.btn-start { width: 100%; padding: 15px; background-color: #ff4a4a; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
.btn-start:hover { background-color: #e03b3b; }
.btn-setup-reset { width: 100%; padding: 10px; background-color: #555; color: #bbb; border: 1px solid #666; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.btn-setup-reset:hover { background-color: #dc3545; color: white; border-color: #dc3545; }
.game-screen { display: none; width: 100%; height: 100%; gap: 20px; }

.photo-wrapper { flex: 1.2; display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 40px); }

.fever-timer-container { width: 100%; height: 16px; background-color: #111; border-radius: 8px; border: 1px solid #333; overflow: hidden; display: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); flex-shrink: 0; }
.fever-timer-container.active { display: block; border-color: #ffcc00; }
.fever-timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff3333, #ffcc00, #00ccff); transition: width 0.1s linear; box-shadow: 0 0 8px #ffcc00; }

.photo-container { flex: 1; position: relative; background-color: #333; border: 3px solid #ff4a4a; border-radius: 8px; aspect-ratio: 1 / 1; max-height: 100%; overflow: hidden; transition: border-color 0.3s; }

.photo-container.fever-active { animation: neonBlink 0.9s infinite alternate; border-width: 6px; }
@keyframes neonBlink {
  0% { border-color: #ffcc00; box-shadow: 0 0 15px #ffcc00, inset 0 0 10px #ffcc00; }
  50% { border-color: #00ccff; box-shadow: 0 0 15px #00ccff, inset 0 0 10px #00ccff; }
  100% { border-color: #ff3333; box-shadow: 0 0 15px #ff3333, inset 0 0 10px #ff3333; }
}

.secret-image { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
.grid-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; z-index: 2; }
.piece { background-color: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #dddddd; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); cursor: pointer; user-select: none; }
.piece:hover { background-color: #3d3d3d; color: #ffffff; }
.piece.opened { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: transparent; text-shadow: none; }
</style>
</head>
<style>
.counter-container { flex: 0.8; background-color: #262626; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; overflow-y: auto; }
.header-zone { display: flex; justify-content: center; border-bottom: 2px solid #444; padding-bottom: 10px; flex-direction: column; align-items: center; gap: 5px; }
h2 { margin: 0; color: #ffcc00; }
.mode-badge { font-size: 13px; font-weight: bold; background-color: #ff4a4a; color: white; padding: 3px 8px; border-radius: 4px; }

/* [원본 UI 수호] 처음 주신 단정하고 깔끔한 다크 모드 명예의 전당 테두리 고정 */
.rank-zone { background-color: #1a1a1a; border: 1px solid #ffcc00; border-radius: 6px; padding: 10px; font-size: 14px; }
.rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.rank-title { color: #ffcc00; font-weight: bold; }
.btn-reset { background-color: #dc3545; color: white; border: none; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }

/* [버그 교정] 명예의 전당에 사람이 많아져도 닉네임 입력창을 침범하지 않도록 한 줄 배지 전용 내부 스크롤 구현 */
.rank-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-height: 75px; overflow-y: auto; padding-right: 4px; }

/* [원본 UI 수호] 처음 보내주신 단정하고 직관적인 회색 배지 스타일 환원 */
.rank-item { background-color: #333; padding: 3px 8px; border-radius: 4px; font-size: 13px; }

.input-box { display: flex; gap: 10px; }
.input-box input { flex: 1; padding: 10px; border: none; border-radius: 4px; background-color: #3a3a3a; color: white; font-size: 16px; }
.input-box button { padding: 10px 20px; border: none; border-radius: 4px; background-color: #ff4a4a; color: white; font-weight: bold; cursor: pointer; }
.user-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.user-item { display: flex; align-items: center; background-color: #333; padding: 8px 12px; border-radius: 6px; border-left: 5px solid #ffcc00; gap: 10px; }
.user-name { flex: 1; font-size: 16px; font-weight: bold; }
.count-controls { display: flex; align-items: center; gap: 5px; }
.btn-count { width: 32px; height: 32px; border: none; border-radius: 4px; background-color: #444; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
.btn-plus { background-color: #28a745; }
.btn-correct { padding: 0 10px; height: 32px; border: none; border-radius: 4px; background-color: #ffcc00; color: #000; font-size: 13px; font-weight: bold; cursor: pointer; }
.count-display { font-size: 18px; font-weight: bold; min-width: 30px; text-align: center; color: #ffcc00; }
.btn-next-game { width: 100%; padding: 12px; background-color: #17a2b8; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: auto; }
</style>
</head>
<body>
<div class="setup-screen" id="setupScreen">
  <h1>사진 맞히기 게임 설정</h1>
  <div class="grid-select-zone">
    <label for="gridSelect">🧩 난이도 (가릴 칸수) 선택</label>
    <select class="select-box" id="gridSelect">
      <option value="100">100칸 (10 x 10)</option>
      <option value="150">150칸 (15 x 10)</option>
      <option value="200">200칸 (20 x 10)</option>
    </select>
    <label for="modeSelect">🕹️ 오픈 방식 선택</label>
    <select class="select-box" id="modeSelect">
      <option value="random">🎲 랜덤 모드 (시청자 닉네임 추가 시 랜덤오픈)</option>
      <option value="manual">✋ 수동 모드 (시청자 닉네임 추가 시 수동오픈)</option>
    </select>
  </div>
  <label class="file-label" for="imageInput">
    <span id="fileStatus">📷 정답 사진 선택하기</span>
    <input type="file" id="imageInput" accept="image/*" onchange="processImage(this)">
  </label>
  <div class="status-message" id="statusMessage">🔒 사진이 등록되었습니다!</div>
  <button class="btn-start" onclick="startGame()">게임 시작 🎮</button>
  
  <!-- [신규 기능] 첫화면용 누적 데이터 완전 초기화 버튼 -->
  <button class="btn-setup-reset" onclick="resetAllDataFromSetup()">🧹 데이터 초기화</button>
</div>

<div class="game-screen" id="gameScreen">
  <div class="photo-wrapper">
    <div class="fever-timer-container" id="feverTimerContainer">
      <div class="fever-timer-bar" id="feverTimerBar"></div>
    </div>
    <div class="photo-container" id="photoContainer">
      <img class="secret-image" id="secretImage" src="" alt="정답 이미지">
      <div class="grid-mask" id="gridMask"></div>
    </div>
  </div>
  
  <div class="counter-container">
    <div class="header-zone">
      <h2>사진 맞히기 게임</h2>
     <label style="width: 100%; text-align: center; margin-bottom: 6px; font-size: 13px;">(코인 개수만큼 정답기회, 틀리면 차감, 피버모드(3%) 20초)</label>
      <span id="currentModeBadge" class="mode-badge">랜덤 모드</span>
    </div>
    <div class="rank-zone">
      <div class="rank-header">
        <span class="rank-title">🏆 오늘의 명예의 전당</span>
        <button class="btn-reset" onclick="resetAllData()">전체 리셋 🧹</button>
      </div>
      <div class="rank-list" id="rankList"><span style="color:#666;">아직 정답자가 없습니다.</span></div>
    </div>
    <div class="input-box">
      <input type="text" id="usernameInput" placeholder="시청자 닉네임 입력" onkeypress="handleKeyPress(event)">
      <button onclick="addUser()">추가</button>
    </div>
    <div class="user-list" id="userList"></div>
    <button class="btn-next-game" onclick="backToSetup()">다음 게임 준비 (셋팅으로) 🔄</button>
  </div>
</div>
<script>
let selectedImageSrc = "";
let answerData = JSON.parse(localStorage.getItem('quizRankData')) || {};
let isGameFinished = false;
let gameMode = "random";

// 동점 상황에서 먼저 점수를 선점한 사람의 순위를 지켜주기 위한 내부 순서 기록 객체
let answerOrder = JSON.parse(localStorage.getItem('quizAnswerOrder')) || {};

// 3% 확률 피버모드 활성화 상태 추적 변수 및 타이머 인터벌 변수
let isFeverActive = false;
let feverTimeoutId = null;
let feverIntervalId = null;

window.onload = function() {
  updateRankBoard();
};

/* [완벽 수리] 이미지 바이너리 경로 배열 인덱스를 정확히 찾아 로딩을 정상화했습니다 */
function processImage(input) {
  if (input.files && input.files[0]) {
    if (selectedImageSrc && selectedImageSrc.startsWith('blob:')) {
      URL.revokeObjectURL(selectedImageSrc);
    }
    selectedImageSrc = URL.createObjectURL(input.files[0]);
    document.getElementById('statusMessage').style.display = 'block';
    document.getElementById('fileStatus').innerText = '✅ 사진 선택 완료';
  }
}

function startGame() {
  if (!selectedImageSrc) {
    alert("정답으로 사용할 사진을 먼저 선택해 주세요!");
    return;
  }
  isGameFinished = false;
  
  clearFeverTimer();
  
  gameMode = document.getElementById('modeSelect').value;
  const badge = document.getElementById('currentModeBadge');
  if (gameMode === "random") {
    badge.innerText = "🎲 랜덤 모드";
    badge.style.backgroundColor = "#28a745";
  } else {
    badge.innerText = "✋ 수동 모드";
    badge.style.backgroundColor = "#ff4a4a";
  }
  document.getElementById('secretImage').src = selectedImageSrc;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  document.body.style.alignItems = 'stretch';
  document.body.style.justifyContent = 'stretch';
  initGrid(parseInt(document.getElementById('gridSelect').value));
}

function initGrid(total) {
  const gridMask = document.getElementById('gridMask');
  gridMask.innerHTML = "";
  let cols = 10, rows = total / cols;
  gridMask.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  gridMask.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  for (let i = 1; i <= total; i++) {
    const piece = document.createElement('div');
    piece.classList.add('piece');
    piece.innerText = i;
    if (total === 150) piece.style.fontSize = '17px';
    else if (total === 200) piece.style.fontSize = '14px';
    piece.addEventListener('click', () => {
      if (!isGameFinished && gameMode === "manual") {
        piece.classList.toggle('opened');
      }
    });
    gridMask.appendChild(piece);
  }
}

function openRandomPiece() {
  if (isGameFinished) return;
  const unopenedPieces = Array.from(document.querySelectorAll('.piece')).filter(p => !p.classList.contains('opened'));
  if (unopenedPieces.length === 0) {
    alert("모든 조각이 이미 열렸습니다!");
    return;
  }
  
  const countToOpen = isFeverActive ? 2 : 1;
  for (let k = 0; k < countToOpen; k++) {
    const currentUnopened = Array.from(document.querySelectorAll('.piece')).filter(p => !p.classList.contains('opened'));
    if (currentUnopened.length === 0) break;
    const randomIndex = Math.floor(Math.random() * currentUnopened.length);
    currentUnopened[randomIndex].classList.add('opened');
  }
}

// [핵심 버그 수정 완료] 
// 피버 도중 또 터지면 구버전 시계를 삭제(클리어)하고 다시 처음부터 20초 타이머를 새롭게 충전 연산합니다.
function startFeverTimeout() {
  clearFeverTimer();

  isFeverActive = true;
  const timerContainer = document.getElementById('feverTimerContainer');
  const timerBar = document.getElementById('feverTimerBar');
  const photoContainer = document.getElementById('photoContainer');

  timerContainer.classList.add('active');
  photoContainer.classList.add('fever-active');
  timerBar.style.width = '100%';

  const totalDuration = 20000; 
  const intervalStep = 100;    
  let timeRemaining = totalDuration;

  feverIntervalId = setInterval(() => {
    timeRemaining -= intervalStep;
    const percentage = (timeRemaining / totalDuration) * 100;
    timerBar.style.width = percentage + '%';

    if (timeRemaining <= 0) {
      clearInterval(feverIntervalId);
    }
  }, intervalStep);

  feverTimeoutId = setTimeout(() => {
    isFeverActive = false;
    timerContainer.classList.remove('active');
    photoContainer.classList.remove('fever-active');
    alert("⏳ 피버 타임이 종료되었습니다! 다시 1칸씩 오픈됩니다.");
  }, totalDuration);
}

function clearFeverTimer() {
  if (feverTimeoutId) clearTimeout(feverTimeoutId);
  if (feverIntervalId) clearInterval(feverIntervalId);
  isFeverActive = false;
  const tContainer = document.getElementById('feverTimerContainer');
  const pContainer = document.getElementById('photoContainer');
  if (tContainer) tContainer.classList.remove('active');
  if (pContainer) pContainer.classList.remove('fever-active');
}

function updateRankBoard() {
  const rankListZone = document.getElementById('rankList');
  rankListZone.innerHTML = "";
  localStorage.setItem('quizRankData', JSON.stringify(answerData));
  localStorage.setItem('quizAnswerOrder', JSON.stringify(answerOrder));
  
  const sortedRank = Object.entries(answerData)
    .filter(([_, c]) => c > 0)
    .sort((a, b) => {
      // [핵심 버그 수정 완료] 배열 객체 전체가 아닌, 1등 자리를 판별할 점수 데이터[1]을 명확히 대입하여 정렬 연산합니다.
      const countA = a[1];
      const countB = b[1];
      
      if (countB !== countA) {
        return countB - countA; // 1순위: 무조건 누적 점수 숫자가 더 높은 사람 우선 (역전 규칙)
      }
      
      const nameA = a[0];
      const nameB = b[0];
      const orderA = answerOrder[`${nameA}_${countA}`] || 0;
      const orderB = answerOrder[`${nameB}_${countB}`] || 0;
      return orderA - orderB; // 2순위: 동점일 땐 먼저 점수를 올렸던 사람 우선 (선점권 보호)
    }); 

  if (sortedRank.length === 0) {
    rankListZone.innerHTML = '<span style="color:#666;">아직 정답자가 없습니다.</span>';
    return;
  }
  
  sortedRank.forEach(([name, count], index) => {
    const medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : "";
    const rankItem = document.createElement('span');
    rankItem.classList.add('rank-item');
    rankItem.innerHTML = `${medal}<b>${name}</b>: ${count}개`;
    rankListZone.appendChild(rankItem);
  });
}

function forceGoToSetup() {
  clearFeverTimer();
  if (selectedImageSrc && selectedImageSrc.startsWith('blob:')) {
    URL.revokeObjectURL(selectedImageSrc);
  }
  selectedImageSrc = "";
  document.getElementById('imageInput').value = "";
  document.getElementById('fileStatus').innerText = '📷 정답 사진 선택하기';
  document.getElementById('statusMessage').style.display = 'none';
  document.getElementById('userList').innerHTML = "";
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  document.body.style.alignItems = 'center';
  document.body.style.justifyContent = 'center';
}

function backToSetup() {
  if(!confirm("현재 사진판과 하단 카운터가 초기화됩니다. 다음 게임으로 가시겠습니까?")) return;
  forceGoToSetup();
}

function resetAllDataFromSetup() {
  if(confirm("⚠️ 저장된 누적 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) {
    answerData = {};
    answerOrder = {};
    localStorage.removeItem('quizRankData');
    localStorage.removeItem('quizAnswerOrder');
    updateRankBoard();
    alert("데이터가 삭제되었습니다. 새 게임을 등록하세요!");
  }
}

function resetAllData() {
  if(confirm("⚠️ 오늘의 명예의 전당 점수를 삭제하고 초기화 및 설정 화면으로 돌아가시겠습니까?")) {
    answerData = {};
    answerOrder = {};
    localStorage.removeItem('quizRankData');
    localStorage.removeItem('quizAnswerOrder');
    updateRankBoard();
    document.querySelectorAll('.btn-correct').forEach(btn => {
      btn.innerText = `정답🏆 (0)`;
    });
    alert("완전 초기화되었습니다.");
    forceGoToSetup();
  }
}
function addUser() {
  const input = document.getElementById('usernameInput'), name = input.value.trim();
  if (name === '') return;
  const userList = document.getElementById('userList');
  let existingItem = null;
  const items = userList.querySelectorAll('.user-item');
  for(let i = 0; i < items.length; i++) {
    if(items[i].querySelector('.user-name').innerText === name) {
      existingItem = items[i];
      break;
    }
  }
  
  if(existingItem) {
    const display = existingItem.querySelector('.count-display');
    display.innerText = parseInt(display.innerText) + 1;
    
    if (gameMode === "random") {
      const dice = Math.floor(Math.random() * 100) + 1;
      if (dice <= 3) { // 3% 확률로 20초 피버모드 발동 (중첩 시 시간 리셋 충전)
        startFeverTimeout();
        alert(`🔥 대박! 3% 확률 돌발 피버모드 발동! 🔥\n지금부터 20초 동안 조각이 [2칸씩] 열립니다!`);
      }
      openRandomPiece();
    }
    input.value = '';
    input.focus();
    return;
  }

  const userItem = document.createElement('div'); 
  userItem.classList.add('user-item'); 
  
  const userName = document.createElement('div'); 
  userName.classList.add('user-name'); 
  userName.innerText = name; 
  
  const controls = document.createElement('div'); 
  controls.classList.add('count-controls'); 
  
  const btnMinus = document.createElement('button'); 
  btnMinus.classList.add('btn-count'); 
  btnMinus.innerText = '-'; 
  
  const countDisplay = document.createElement('div'); 
  countDisplay.classList.add('count-display'); 
  countDisplay.innerText = '1'; 
  
  const btnPlus = document.createElement('button'); 
  btnPlus.classList.add('btn-count', 'btn-plus'); 
  btnPlus.innerText = '+'; 
  
  const btnCorrect = document.createElement('button'); 
  btnCorrect.classList.add('btn-correct'); 
  if (!answerData[name]) answerData[name] = 0; 
  btnCorrect.innerText = `정답🏆 (${answerData[name]})`; 
  
  btnPlus.addEventListener('click', () => { 
    countDisplay.innerText = parseInt(countDisplay.innerText) + 1; 
    
    if (gameMode === "random") {
      const dice = Math.floor(Math.random() * 100) + 1;
      if (dice <= 3) { // 수동 플러스 누를 때도 3% 확률 적용 (중첩 시 시간 리셋 충전)
        startFeverTimeout();
        alert(`🔥 대박! 3% 확률 돌발 피버모드 발동! 🔥\n지금부터 20초 동안 조각이 [2칸씩] 열립니다!`);
      }
      openRandomPiece(); 
    }
  }); 
  
  btnMinus.addEventListener('click', () => { 
    let current = parseInt(countDisplay.innerText); 
    if (current > 1) countDisplay.innerText = current - 1; 
    else if(confirm(`${name}님을 삭제하시겠습니까?`)) userItem.remove(); 
  }); 
  
  btnCorrect.addEventListener('click', () => { 
    if (isGameFinished) { 
      alert("이번 판은 이미 정답자가 나왔습니다! 다음 게임을 준비해 주세요."); 
      return; 
    } 
    if (!confirm(`${name}님을 이번 판의 정답자로 처리하고 사진을 전체 공개하시겠습니까?`)) return; 
    isGameFinished = true; 
    
    answerData[name] += 1; 
    
    const currentScoreKey = `${name}_${answerData[name]}`;
    if (!answerOrder[currentScoreKey]) {
      answerOrder[currentScoreKey] = Date.now();
    }
    
    // 정답을 맞혔으므로 진행 중이던 피버 타이머 바 강제 종료 및 클리어
    clearFeverTimer();
    
    document.querySelectorAll('.btn-correct').forEach(btn => { 
      const uName = btn.closest('.user-item').querySelector('.user-name').innerText; 
      btn.innerText = `정답🏆 (${answerData[uName] || 0})`; 
    }); 
    updateRankBoard(); 
    document.querySelectorAll('.piece').forEach(piece => { 
      piece.classList.add('opened'); 
    }); 
  }); 
  
  controls.appendChild(btnMinus); 
  controls.appendChild(countDisplay); 
  controls.appendChild(btnPlus); 
  userItem.appendChild(userName); 
  userItem.appendChild(controls); 
  userItem.appendChild(btnCorrect); 
  userList.appendChild(userItem); 
  
  if (gameMode === "random") { 
    const dice = Math.floor(Math.random() * 100) + 1;
    if (dice <= 3) { // 최초 등록 시에도 3% 확률 적용 (중첩 시 시간 리셋 충전)
      startFeverTimeout();
      alert(`🔥 대박! 3% 확률 돌발 피버모드 발동! 🔥\n지금부터 20초 동안 조각이 [2칸씩] 열립니다!`);
    }
    openRandomPiece(); 
  } 
  input.value = ''; 
  input.focus(); 
} 

function handleKeyPress(event) { 
  if (event.key === 'Enter') addUser(); 
}
</script>
</body>
</html>
